name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Testes unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Executar testes
        run: |
          mkdir -p test-results
          pytest -v --junitxml=test-results/junit.xml

      - name: Upload do relatório de testes
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-results/junit.xml

  build:
    name: Build / Empacotamento
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Preparar pacote
        run: |
          mkdir -p dist
          zip -r dist/projeto-np1.zip . \
            -x "*.git*" \
            -x "*__pycache__*" \
            -x "*.pytest_cache*" \
            -x "*.venv*" \
            -x "*dist/*" \
            -x "*test-results/*"

      - name: Upload do pacote
        uses: actions/upload-artifact@v4
        with:
          name: build-package
          path: dist/projeto-np1.zip

  summary:
    name: Resumo do CI
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()

    steps:
      - name: Exibir resumo final
        run: |
          echo "Resultado do job de testes: ${{ needs.test.result }}"
          echo "Resultado do job de build: ${{ needs.build.result }}"

          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "CI finalizado com falha."
            exit 1
          fi

          echo "CI finalizado com sucesso."
