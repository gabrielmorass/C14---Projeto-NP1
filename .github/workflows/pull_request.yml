name: CI Pipeline

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes
        run: pytest --tb=short -v

  notify:
    name: Notificação
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Comentar resultado no PR
        uses: actions/github-script@v7
        with:
          script: |
            const build  = '${{ needs.build.result }}';
            const test   = '${{ needs.test.result }}';
            const ok     = (r) => r === 'success' ? '✅ Passou' : r === 'skipped' ? '⏭️ Ignorado' : '❌ Falhou';
            const overall = (build === 'success' && test === 'success') ? '✅ CI passou com sucesso!' : '❌ CI falhou.';

            const body = [
              `## ${overall}`,
              '',
              '| Etapa  | Resultado |',
              '|--------|-----------|',
              `| Build  | ${ok(build)} |`,
              `| Testes | ${ok(test)} |`,
              '',
              `_Pipeline concluído em: ${new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })}_`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
